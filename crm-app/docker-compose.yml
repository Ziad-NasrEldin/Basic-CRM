services:
  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/crm.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3092}
    ports:
      - "3092:3000"
    volumes:
      - sqlite_data:/data
    command: sh -c "npm run prisma:migrate && npm start"

  # Daily backup service - copies SQLite file, keeps 30 days
  backup:
    image: alpine:3.19
    container_name: crm-app-backup
    restart: unless-stopped
    volumes:
      - sqlite_data:/data:ro
      - backups:/backups
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh
    entrypoint: /bin/sh -c 'chmod +x /usr/local/bin/backup-db.sh && while true; do /usr/local/bin/backup-db.sh; sleep 86400; done'
    profiles:
      - production

volumes:
  # ⚠️  WARNING: NEVER use "docker compose down -v" or "docker volume rm crm-app_sqlite_data"
  # This volume contains ALL your production data.
  # To safely restart: use "docker compose restart" or "docker compose up -d"
  sqlite_data:
    driver: local

  # Persistent backup volume - separate from sqlite_data
  # Backups are automatically created daily and stored here for 30 days
  # Restore: cp /backups/crm_YYYYMMDD_HHMMSS.db /data/crm.db && docker compose restart crm-app
  backups:
    driver: local
    